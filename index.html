<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Möngö — Хувийн санхүүгийн апп</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f0;--bg3:#efefea;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px;
  --brand:#49b0b6;--brand-dark:#337a7f;--brand-light:#e0f5f6;
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --red:#A32D2D;--red-light:#FCEBEB;--red-dark:#791F1F;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#633806;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1e1c;--bg2:#2a2a28;--bg3:#323230;--text:#e8e6de;--text2:#9a9890;--text3:#6a6860;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--brand-light:#0d3638;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px}
.logo{width:30px;height:30px;border-radius:8px;background:#49b0b6;display:flex;align-items:center;justify-content:center}
.brand-name{font-size:15px;font-weight:700;color:#49b0b6}
.lang-bar{display:flex;gap:3px;flex-wrap:wrap}
.lbtn{padding:3px 9px;font-size:11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.lbtn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.nav{background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 12px;font-size:12px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.nav-btn.active{color:var(--brand);border-bottom:2px solid var(--brand);font-weight:600}
.main{max-width:720px;margin:0 auto;padding:14px}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px;margin-bottom:11px}
.card-title{font-size:13px;font-weight:600;margin-bottom:11px;color:var(--text)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:7px;margin-bottom:11px}
.metric{border-radius:var(--radius);padding:9px 11px}
.metric-lbl{font-size:10px;margin-bottom:2px;opacity:.8}
.metric-val{font-size:15px;font-weight:600}
.form-row{display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.fi{flex:1;min-width:80px;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none}
.fi:focus{border-color:var(--brand)}
.btn{padding:7px 13px;font-size:13px;border-radius:var(--radius);cursor:pointer;font-weight:500;border:0.5px solid var(--border2);background:transparent;color:var(--text)}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--brand);color:#fff;border-color:var(--brand)}.btn-p:hover{background:var(--brand-dark)}
.btn-sm{padding:4px 7px;font-size:11px}
.btn-d{color:var(--red);border-color:transparent}.btn-d:hover{background:var(--red-light)}
.type-toggle{display:flex;gap:0;margin-bottom:9px;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content}
.tt-btn{padding:6px 15px;font-size:13px;border:none;cursor:pointer;background:transparent;color:var(--text2)}
.tt-i{background:var(--green-light);color:var(--green-dark);font-weight:500}
.tt-e{background:var(--red-light);color:var(--red-dark);font-weight:500}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.il{display:flex;flex-direction:column;gap:2px}
.ir{display:flex;align-items:center;gap:7px}
.lbl1{font-size:13px;color:var(--text)}
.lbl2{font-size:11px;color:var(--text2)}
.amt{font-size:13px;font-weight:500}
.amt-i{color:var(--green)}.amt-e{color:var(--red)}
.pbar{height:6px;border-radius:3px;overflow:hidden;background:var(--bg2);margin:3px 0}
.pf{height:100%;border-radius:3px;transition:width .3s}
.empty{text-align:center;padding:18px;color:var(--text3);font-size:12px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid transparent}
.chip .rx{font-size:10px;opacity:.7;cursor:pointer;margin-left:2px}
.cat-mgr{background:var(--bg2);border-radius:var(--radius);padding:9px;margin-top:9px}
.slbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.crow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.cp{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cp.sel{border-color:var(--text)}
.irow{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.ic{width:25px;height:25px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;font-size:14px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.ic.sel{border-color:var(--text)}
.add-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.add-row .fi{flex:1;min-width:80px;font-size:12px;padding:5px 8px}
.period-bar{display:flex;gap:4px;margin-bottom:11px;flex-wrap:wrap}
.pb{padding:4px 9px;font-size:11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.pb.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px;margin-top:11px}
.ccrd{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:11px}
.ctitle{font-size:12px;font-weight:600;margin-bottom:7px}
.dwrap{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.leg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:80px}
.li2{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* Collapsible budget block */
.bblock{border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:7px;overflow:hidden}
.bheader{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;user-select:none}
.bheader:hover{background:var(--bg2)}
.bicon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bbody{padding:9px 12px;border-top:0.5px solid var(--border);background:var(--bg2)}
.chevron{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.asr{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border)}
.asr .fi{flex:1;min-width:80px;font-size:12px;padding:4px 7px}
.ic-sm{width:21px;height:21px;border-radius:4px;cursor:pointer;border:1.5px solid transparent;font-size:12px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.ic-sm.sel{border-color:var(--text)}
.cp-sm{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cp-sm.sel{border-color:var(--text)}
.inv-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:11px;margin-bottom:9px}
.tag{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:500}
.gain{color:var(--green-dark);background:var(--green-light)}.loss{color:var(--red-dark);background:var(--red-light)}
.notice{background:var(--brand-light);border-radius:var(--radius);padding:8px 11px;font-size:12px;color:var(--brand-dark);margin-bottom:8px;display:flex;align-items:flex-start;gap:7px}
.pcustom{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.pcustom .fi{font-size:12px;padding:5px 8px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
/* Month group header for txn list */
.month-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;background:var(--bg2);border-radius:var(--radius);margin-bottom:2px;cursor:pointer;user-select:none;margin-top:8px}
.month-hdr:first-child{margin-top:0}
.month-hdr-left{display:flex;align-items:center;gap:6px}
.month-hdr-lbl{font-size:11px;font-weight:600;color:var(--brand)}
.month-hdr-sum{font-size:10px;color:var(--text3)}
/* Budget month selector */
.month-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.msb{padding:4px 10px;font-size:12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;min-width:50px;text-align:center}
.msb.active{background:var(--brand);color:#fff;border-color:var(--brand)}
/* Budget type toggle */
.btype-toggle{display:flex;gap:0;margin-bottom:11px;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content}
.btype-btn{padding:6px 16px;font-size:13px;border:none;cursor:pointer;background:transparent;color:var(--text2)}
.btype-btn.active{background:var(--brand);color:#fff;font-weight:500}
/* Budget summary total bar */
.budget-total-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--brand-light);border-radius:var(--radius);margin-bottom:11px}
/* Sub-cat selector dropdown */
.subcat-dropdown{border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);overflow:hidden;margin-top:4px;margin-bottom:6px}
.subcat-opt{padding:7px 11px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px}
.subcat-opt:hover{background:var(--bg2)}
.subcat-opt.sel{background:var(--brand-light);color:var(--brand-dark);font-weight:500}
/* Lock icon */
.lock-btn{font-size:11px;padding:2px 5px;border-radius:5px;border:0.5px solid var(--border2);background:transparent;cursor:pointer;color:var(--text3)}
.lock-btn:hover{color:var(--text)}
/* Goal cumul bars */
.cumul-bar-wrap{margin-top:8px;padding:7px 9px;background:var(--bg2);border-radius:var(--radius)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">
      <svg viewBox="0 0 500 500" width="18" height="18" fill="none">
        <circle cx="250" cy="250" r="155" stroke="#f9f940" stroke-width="32" fill="none" opacity="0.9"/>
        <circle cx="250" cy="96" r="13" fill="#f9f940" opacity="0.5"/>
        <circle cx="404" cy="250" r="13" fill="#f9f940" opacity="0.5"/>
        <circle cx="250" cy="404" r="13" fill="#f9f940" opacity="0.5"/>
        <circle cx="96" cy="250" r="13" fill="#f9f940" opacity="0.5"/>
        <line x1="250" y1="248" x2="250" y2="132" stroke="#fff" stroke-width="28" stroke-linecap="round"/>
        <polygon points="250,102 228,140 272,140" fill="#fff"/>
        <line x1="268" y1="250" x2="374" y2="250" stroke="#f9f940" stroke-width="24" stroke-linecap="round"/>
        <polygon points="404,250 368,228 368,272" fill="#f9f940"/>
        <circle cx="250" cy="250" r="80" fill="white"/>
        <circle cx="250" cy="250" r="63" fill="#49b0b6"/>
        <text x="250" y="270" text-anchor="middle" font-size="68" font-weight="800" fill="#f9f940" font-family="Arial,sans-serif">$</text>
        <circle cx="250" cy="250" r="11" fill="#f9f940"/>
      </svg>
    </div>
    <span class="brand-name">Möngö</span>
  </div>
  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
    <div id="save-dot" style="width:6px;height:6px;border-radius:50%;background:#49b0b6;opacity:0;transition:opacity 0.3s;flex-shrink:0"></div>
    <button onclick="exportData()" style="padding:3px 9px;font-size:11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer" title="Backup">⬇</button>
    <label style="padding:3px 9px;font-size:11px;border-radius:20px;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;line-height:1.8" title="Сэргээх">⬆<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    <button onclick="clearData()" style="padding:3px 9px;font-size:11px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:#A32D2D;cursor:pointer" title="Устгах">🗑</button>
  </div>
  <div class="lang-bar">
    <button class="lbtn active" onclick="setLang('mn',this)">🇲🇳</button>
    <button class="lbtn" onclick="setLang('en',this)">🇬🇧</button>
    <button class="lbtn" onclick="setLang('zh',this)">🇨🇳</button>
    <button class="lbtn" onclick="setLang('ja',this)">🇯🇵</button>
    <button class="lbtn" onclick="setLang('ko',this)">🇰🇷</button>
    <button class="lbtn" onclick="setLang('ru',this)">🇷🇺</button>
    <button class="lbtn" onclick="setLang('de',this)">🇩🇪</button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showTab('dashboard',this)" id="nav-dashboard"></button>
  <button class="nav-btn" onclick="showTab('transactions',this)" id="nav-transactions"></button>
  <button class="nav-btn" onclick="showTab('budget',this)" id="nav-budget"></button>
  <button class="nav-btn" onclick="showTab('goals',this)" id="nav-goals"></button>
  <button class="nav-btn" onclick="showTab('debts',this)" id="nav-debts"></button>
  <button class="nav-btn" onclick="showTab('invest',this)" id="nav-invest"></button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="tab-dashboard" class="section active">
  <div class="period-bar">
    <button class="pb active" onclick="setPeriod('7d',this)" id="pb-7d"></button>
    <button class="pb" onclick="setPeriod('1m',this)" id="pb-1m"></button>
    <button class="pb" onclick="setPeriod('3m',this)" id="pb-3m"></button>
    <button class="pb" onclick="setPeriod('1y',this)" id="pb-1y"></button>
    <button class="pb" onclick="setPeriod('all',this)" id="pb-all"></button>
    <button class="pb" onclick="setPeriod('custom',this)" id="pb-custom"></button>
  </div>
  <div id="custom-period" style="display:none" class="pcustom">
    <span style="font-size:12px;color:var(--text2)" id="lbl-from"></span><input type="date" class="fi" id="p-from">
    <span style="font-size:12px;color:var(--text2)" id="lbl-to"></span><input type="date" class="fi" id="p-to">
    <button class="btn btn-p" style="font-size:12px;padding:5px 10px" onclick="applyCustom()" id="btn-apply"></button>
  </div>
  <div class="sgrid">
    <div class="metric" id="m-inc"><div class="metric-lbl" id="lbl-income"></div><div class="metric-val" id="d-inc">0</div></div>
    <div class="metric" id="m-exp"><div class="metric-lbl" id="lbl-expense"></div><div class="metric-val" id="d-exp">0</div></div>
    <div class="metric" id="m-bal"><div class="metric-lbl" id="lbl-balance"></div><div class="metric-val" id="d-bal">0</div></div>
    <div class="metric" id="m-debt"><div class="metric-lbl" id="lbl-totaldebt"></div><div class="metric-val" id="d-dbt">0</div></div>
    <div class="metric" id="m-inv"><div class="metric-lbl" id="lbl-investlbl"></div><div class="metric-val" id="d-inv">0</div></div>
    <div class="metric" id="m-savings"><div class="metric-lbl" id="lbl-savingslbl"></div><div class="metric-val" id="d-savings">0</div></div>
  </div>
  <div class="card"><div class="card-title" id="lbl-recent"></div><div id="recent-list"><div class="empty" id="lbl-notxn-d"></div></div></div>
  <div class="card"><div class="card-title" id="lbl-budgetprog"></div><div id="budget-overview"><div class="empty" id="lbl-nobudget-d"></div></div></div>
  <div class="cgrid">
    <div class="ccrd"><div class="ctitle" id="lbl-inccat"></div><div class="dwrap"><canvas id="c-inc" width="85" height="85"></canvas><div class="leg" id="l-inc"></div></div></div>
    <div class="ccrd"><div class="ctitle" id="lbl-expcat"></div><div class="dwrap"><canvas id="c-exp" width="85" height="85"></canvas><div class="leg" id="l-exp"></div></div></div>
    <div class="ccrd"><div class="ctitle" id="lbl-savingscat"></div><div class="dwrap"><canvas id="c-gls" width="85" height="85"></canvas><div class="leg" id="l-gls"></div></div></div>
    <div class="ccrd"><div class="ctitle" id="lbl-debtcat"></div><div class="dwrap"><canvas id="c-dbt" width="85" height="85"></canvas><div class="leg" id="l-dbt"></div></div></div>
    <div class="ccrd"><div class="ctitle" id="lbl-investcat"></div><div class="dwrap"><canvas id="c-inv" width="85" height="85"></canvas><div class="leg" id="l-inv"></div></div></div>
  </div>
</div>

<!-- TRANSACTIONS -->
<div id="tab-transactions" class="section">
  <div class="card">
    <div class="card-title" id="lbl-addtxn"></div>
    <div class="type-toggle">
      <button class="tt-btn tt-i" id="btn-income" onclick="setType('income')"></button>
      <button class="tt-btn" id="btn-expense" onclick="setType('expense')"></button>
    </div>
    <div id="invest-auto-notice" style="display:none" class="notice">
      <span style="font-size:14px">📈</span><span id="lbl-autoinvest"></span>
    </div>
    <div class="form-row">
      <input type="text" class="fi" id="t-desc">
      <input type="text" class="fi" id="t-amount" placeholder="0" inputmode="decimal">
    </div>
    <!-- Sub-category selector (shown when expense cat has subs) -->
    <div id="t-subcat-wrap" style="display:none;margin-bottom:7px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--bg)" onclick="tglSubDrop()" id="t-subcat-btn">
        <span id="t-subcat-label" style="font-size:13px;color:var(--text2)"></span>
        <span style="font-size:10px;color:var(--text3)" id="t-subcat-arrow">▼</span>
      </div>
      <div id="t-subcat-list" style="display:none" class="subcat-dropdown"></div>
    </div>
    <div class="form-row">
      <select class="fi" id="t-cat" onchange="onCatChange()"></select>
      <input type="date" class="fi" id="t-date">
      <button class="btn btn-p" onclick="addTransaction()" id="btn-add-txn"></button>
    </div>
    <div id="invest-extra" style="display:none;margin-bottom:7px">
      <div style="background:var(--bg2);border-radius:var(--radius);padding:9px;margin-top:4px">
        <div class="slbl" id="lbl-invdetail"></div>
        <select class="fi" style="width:100%" id="t-inv-type"></select>
      </div>
    </div>
    <div class="cat-mgr">
      <div class="slbl" id="lbl-catconfig"></div>
      <div class="chips" id="t-chips"></div>
      <div class="slbl" style="margin-bottom:4px" id="lbl-icon-t"></div><div class="irow" id="t-irow"></div>
      <div class="slbl" style="margin-bottom:4px" id="lbl-color-t"></div><div class="crow" id="t-crow"></div>
      <div class="add-row"><input type="text" class="fi" id="t-newcat"><button class="btn btn-p" style="font-size:11px;padding:4px 9px" onclick="addTransCat()" id="btn-addcat"></button></div>
    </div>
  </div>
  <div class="card"><div class="card-title" id="lbl-alltxns"></div><div id="all-txns"><div class="empty" id="lbl-notxn-t"></div></div></div>
</div>

<!-- BUDGET -->
<div id="tab-budget" class="section">
  <div class="card">
    <div class="card-title" id="lbl-budget-type-title"></div>
    <div class="btype-toggle">
      <button class="btype-btn active" id="btype-income" onclick="setBudgetType('income',this)" id="lbl-btype-income"></button>
      <button class="btype-btn" id="btype-expense" onclick="setBudgetType('expense',this)" id="lbl-btype-expense"></button>
    </div>
    <div class="card-title" id="lbl-budget-month-title" style="margin-bottom:7px"></div>
    <div class="month-sel" id="budget-month-sel"></div>
  </div>
  <!-- Budget total summary -->
  <div class="budget-total-bar" id="budget-total-bar">
    <span style="font-size:12px;font-weight:500;color:var(--brand-dark)" id="lbl-budget-total-lbl"></span>
    <span style="font-size:14px;font-weight:700;color:var(--brand-dark)" id="budget-total-val">0</span>
  </div>
  <div class="card">
    <div class="card-title" id="lbl-addbudgetcat"></div>
    <div class="slbl" style="margin-bottom:4px" id="lbl-icon-b"></div><div class="irow" id="b-irow"></div>

function parseAmt(str){return parseFloat((str||'').replace(/,/g,''))||0;}
function fmt(n){
  const rounded=Math.round(n);
  return CS+rounded.toLocaleString('en-US');
}

// Format amount input with commas as user types
function setupAmtInput(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('input',function(){
    const raw=this.value.replace(/[^0-9.]/g,'');
    const parts=raw.split('.');
    parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
    const pos=this.selectionStart;
    this.value=parts.join('.');
  });
}

function bKeyFor(cat){return cat.key||cat.name||'';}

function getBudgetVal(bKey,month){
  if(!budgets[bKey])return 0;
  if(typeof budgets[bKey]==='object'&&!Array.isArray(budgets[bKey])){return budgets[bKey][month]||0;}
  return budgets[bKey]||0;
}
function setBudgetVal(bKey,month,val){
  if(!budgets[bKey])budgets[bKey]={};
  if(typeof budgets[bKey]!=='object')budgets[bKey]={};
  budgets[bKey][month]=val;
}

// Txn grouped by month
function txnsByMonth(){
  const groups={};
  [...txns].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(t=>{
    const ym=t.date?t.date.substring(0,7):'';
    if(!groups[ym])groups[ym]=[];
    groups[ym].push(t);
  });
  return groups;
}

    total+=getBudgetVal(bKeyFor(cat),mo);
    (cat.subs||[]).forEach(sb=>total+=getBudgetVal(bSubKey(cat,sb),mo));
  });
  const el=document.getElementById('budget-total-val');
  if(el)el.textContent=fmt(total);
}

// ── Period ────────────────────────────────────────────────────────────────
function getPD(){
  const now=new Date();now.setHours(23,59,59,999);let from=new Date(0);
  if(period==='7d'){from=new Date(now);from.setDate(from.getDate()-6);from.setHours(0,0,0,0);}
  else if(period==='1m'){from=new Date(now);from.setMonth(from.getMonth()-1);from.setHours(0,0,0,0);}
  else if(period==='3m'){from=new Date(now);from.setMonth(from.getMonth()-3);from.setHours(0,0,0,0);}
  else if(period==='1y'){from=new Date(now);from.setFullYear(from.getFullYear()-1);from.setHours(0,0,0,0);}
  else if(period==='custom'&&cfrom&&cto){from=new Date(cfrom);from.setHours(0,0,0,0);now.setTime(new Date(cto).setHours(23,59,59,999));}
  return{from,to:now};
}
function fT(){const{from,to}=getPD();return txns.filter(t=>{const d=new Date(t.date);return d>=from&&d<=to;});}
function setPeriod(p,btn){period=p;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('custom-period').style.display=p==='custom'?'flex':'none';if(p!=='custom')rDash();}

function addTransaction(){
  const desc=document.getElementById('t-desc').value.trim();
  const amount=parseAmt(document.getElementById('t-amount').value);
  const catName=document.getElementById('t-cat').value;
  const date=document.getElementById('t-date').value;
  if(!desc||!amount||amount<=0)return;
  const subcatName=selSubcat||null;
  txns.unshift({id:Date.now(),desc,amount,catName,subcatName,date,type:curType});
  if(curType==='expense'){
    const g=goals.find(g=>g.name===catName||g.name===desc);if(g)g.saved=Math.max(0,(g.saved||0)-amount);
    const d=debts.find(d=>d.name===catName||d.name===desc);if(d)d.remaining=Math.max(0,d.remaining-amount);
    const cat=expCats.find(c=>cN(c)===catName);
    if(cat&&isInv(cat)){const tK=document.getElementById('t-inv-type').value;invests.unshift({id:Date.now()+1,name:desc,typeKey:tK,invested:amount,current:amount,date,autoAdded:true});rInvests();rDonut('inv');}
  }
  document.getElementById('t-desc').value='';
  document.getElementById('t-amount').value='';
  selSubcat=null;subDropOpen=false;
  document.getElementById('t-subcat-label').textContent=L.subcatPh||'Дэд ангилал сонгох';
  document.getElementById('t-subcat-list').style.display='none';
  saveData();rAll();
}

function addGoal(){
  const name=document.getElementById('g-name').value.trim();
  const target=parseAmt(document.getElementById('g-target').value);
  const saved=parseAmt(document.getElementById('g-saved').value);
  const dead=document.getElementById('g-dead').value.trim();
  if(!name||!target)return;
  goals.push({id:Date.now(),name,target,saved,dead,history:[]});
  document.getElementById('g-name').value='';document.getElementById('g-target').value='';
  document.getElementById('g-saved').value='';document.getElementById('g-dead').value='';
  saveData();rGoals();rDonut('gls');
}
function updGoal(id,v){
  const g=goals.find(x=>x.id===id);if(!g)return;
  const newVal=parseAmt(v);if(!g.history)g.history=[];
  const ym=new Date().toISOString().substring(0,7);
  const last=g.history[g.history.length-1];
  if(!last||last.ym!==ym)g.history.push({ym,saved:newVal});else last.saved=newVal;
  g.saved=newVal;saveData();rGoals();rDonut('gls');
}
function delGoal(id){
  if(!confirm(L.confirmDel||'Устгах уу?'))return;
  goals=goals.filter(g=>g.id!==id);saveData();rGoals();rDonut('gls');
}

}

function drawDonut(canvas,data,colors){
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-3,r=R*.55;
  ctx.clearRect(0,0,W,H);const total=data.reduce((s,v)=>s+v,0);
  if(!total){ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.strokeStyle='rgba(136,135,128,0.2)';ctx.lineWidth=R-r;ctx.stroke();return;}
  let angle=-Math.PI/2;
  data.forEach((v,i)=>{const sw=2*Math.PI*v/total;ctx.beginPath();ctx.arc(cx,cy,R,angle,angle+sw);ctx.arc(cx,cy,r,angle+sw,angle,true);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();angle+=sw;});
}

function rDonut(type){
  let data=[],colors=[],labels=[],cid,lid;const ft=fT();
  if(type==='inc'){cid='c-inc';lid='l-inc';incCats.forEach(c=>{const nm=cN(c);const s=ft.filter(t=>t.type==='income'&&t.catName===nm).reduce((a,t)=>a+t.amount,0);if(s>0){data.push(s);colors.push(c.color);labels.push({name:c.icon+' '+nm,val:s,color:c.color});}});}
  else if(type==='exp'){cid='c-exp';lid='l-exp';expCats.forEach(c=>{const nm=cN(c);const s=ft.filter(t=>t.type==='expense'&&t.catName===nm).reduce((a,t)=>a+t.amount,0);if(s>0){data.push(s);colors.push(c.color);labels.push({name:c.icon+' '+nm,val:s,color:c.color});}});}
  else if(type==='gls'){cid='c-gls';lid='l-gls';goals.forEach((g,i)=>{const v=Math.max(0,g.saved||0);if(v>0){const col=PAL[i%PAL.length];data.push(v);colors.push(col);labels.push({name:g.name,val:v,color:col});}});}
  else if(type==='dbt'){cid='c-dbt';lid='l-dbt';debts.forEach((d,i)=>{if(d.remaining>0){const col=PAL[i%PAL.length];data.push(d.remaining);colors.push(col);labels.push({name:d.name,val:d.remaining,color:col});}});}
  else if(type==='inv'){cid='c-inv';lid='l-inv';const byT={};invests.forEach(inv=>{byT[inv.typeKey]=(byT[inv.typeKey]||0)+inv.current;});const types=INVEST_TYPES_ALL[lang]||INVEST_TYPES_ALL.mn;Object.entries(byT).forEach(([k,v])=>{const col=ICOLS[k]||PAL[0];const tObj=types.find(x=>x.k===k);data.push(v);colors.push(col);labels.push({name:(IICONS[k]||'💡')+' '+(tObj?tObj.label:k),val:v,color:col});});}
  const canvas=document.getElementById(cid);if(!canvas)return;
  drawDonut(canvas,data,colors);
  const leg=document.getElementById(lid);const total=data.reduce((s,v)=>s+v,0);
  leg.innerHTML=labels.length?labels.map(l=>`<div class="li2"><div class="ldot" style="background:${l.color}"></div><span>${l.name}: ${total>0?Math.round(l.val/total*100):0}%</span></div>`).join(''):`<span style="font-size:11px;color:var(--text3)">${L.nodata}</span>`;
}

const DB_KEY='mongo_v4';

function saveData(){
  try{
    const bCatsExpSave=bCatsExp.map(c=>({key:c.key||null,name:c.name||null,icon:c.icon,color:c.color,subs:(c.subs||[]).map(s=>({key:s.key||null,name:s.name||null,color:s.color}))}));
    const bCatsIncSave=bCatsInc.map(c=>({key:c.key||null,name:c.name||null,icon:c.icon,color:c.color,subs:(c.subs||[]).map(s=>({key:s.key||null,name:s.name||null,color:s.color}))}));
    const data={txns,goals,debts,invests,budgets,lang,budgetMonth,budgetType,
      lockedCats:Array.from(lockedCats),
      incCatsCustom:incCats.filter(c=>!c.key),
      expCatsCustom:expCats.filter(c=>!c.key),
      bCatsExpSave,bCatsIncSave};
    localStorage.setItem(DB_KEY,JSON.stringify(data));
    showSaveIndicator();
  }catch(e){console.warn('Save error:',e);}
}

function loadData(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    if(data.txns)txns=data.txns;
    if(data.goals)goals=data.goals.map(g=>({...g,history:g.history||[]}));
    if(data.debts)debts=data.debts;
    if(data.invests)invests=data.invests;
    if(data.budgets)budgets=data.budgets;
    if(data.lang){lang=data.lang;L=LANGS[lang]||LANGS.mn;CS=CURR[lang]||'$';}
    if(data.budgetMonth)budgetMonth=data.budgetMonth;
    if(data.budgetType)budgetType=data.budgetType;
    if(data.lockedCats)lockedCats=new Set(data.lockedCats);
    if(data.incCatsCustom)incCats=[...incCats,...data.incCatsCustom];
    if(data.expCatsCustom)expCats=[...expCats,...data.expCatsCustom];
    // Merge bCats
    function mergeBCats(saved,current){
      if(!saved)return;
      saved.forEach(sv=>{
        const ex=current.find(c=>(sv.key&&c.key===sv.key)||(sv.name&&c.name===sv.name));
        if(ex){
          (sv.subs||[]).forEach(ssub=>{
            const exSub=ex.subs.find(s=>(ssub.key&&s.key===ssub.key)||(ssub.name&&s.name===ssub.name));
            if(!exSub&&(ssub.name||ssub.key))ex.subs.push({name:ssub.name||ssub.key,color:ssub.color||ex.color});
          });
        } else if(sv.name){
          current.push({name:sv.name,icon:sv.icon||'📌',color:sv.color||PAL[0],subs:(sv.subs||[]).filter(s=>s.name).map(s=>({name:s.name,color:s.color||PAL[0]}))});
        }
      });
    }
    mergeBCats(data.bCatsExpSave,bCatsExp);
    mergeBCats(data.bCatsIncSave,bCatsInc);
    return true;
  }catch(e){console.warn('Load error:',e);return false;}
}

function clearData(){if(!confirm('Бүх өгөгдлийг устгах уу?'))return;localStorage.removeItem(DB_KEY);location.reload();}

function exportData(){
  const raw=localStorage.getItem(DB_KEY);
  if(!raw){showToast('Хадгалсан өгөгдөл байхгүй');return;}
  const blob=new Blob([raw],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mongo-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();
  showToast('Backup ✓');
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{try{JSON.parse(ev.target.result);localStorage.setItem(DB_KEY,ev.target.result);location.reload();}catch{showToast('Файл буруу байна');}};
  reader.readAsText(file);
}

function showSaveIndicator(){const el=document.getElementById('save-dot');if(!el)return;el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',1400);}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2628;color:#f9f940;padding:8px 18px;border-radius:20px;font-size:13px;z-index:9999;transition:opacity 0.3s;pointer-events:none';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2400);
}
